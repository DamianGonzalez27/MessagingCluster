version: '3.8'
services:
  # Dev environment - isolated backend network (no broker ports published to host)
  kafka-dev:
    image: apache/kafka:3.4.0
    container_name: kafka-dev
    environment:
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-dev:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-dev:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    networks:
      - dev_backend
    volumes:
      - kafka-dev-data:/var/lib/kafka

  rabbitmq-dev:
    image: rabbitmq:3.11-management
    container_name: rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEV_PASSWORD:-devchangeme}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - 15672:15672  # management UI exposed for ops on host
    networks:
      - dev_backend
      - dev_mgmt
    volumes:
      - rabbitmq-dev-data:/var/lib/rabbitmq

  kafka-dev-exporter:
    image: danielqsj/kafka-exporter:1.2.0
    container_name: kafka-dev-exporter
    environment:
      - KAFKA_SERVER=kafka-dev:9092
    networks:
      - dev_backend
    ports:
      - 9308:9308

  rabbitmq-dev-exporter:
    image: kbudde/rabbitmq-exporter:v0.30.0
    container_name: rabbitmq-dev-exporter
    environment:
      - RABBITMQ_URI=http://dev:${RABBITMQ_DEV_PASSWORD:-devchangeme}@rabbitmq-dev:15672
    networks:
      - dev_backend
    ports:
      - 9419:9419

  # QA environment - similarly isolated
  kafka-qa:
    image: apache/kafka:3.4.0
    container_name: kafka-qa
    environment:
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-qa:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-qa:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    networks:
      - qa_backend
    volumes:
      - kafka-qa-data:/var/lib/kafka

  rabbitmq-qa:
    image: rabbitmq:3.11-management
    container_name: rabbitmq-qa
    environment:
      RABBITMQ_DEFAULT_USER: qa
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_QA_PASSWORD:-qachangeme}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - 15674:15672
    networks:
      - qa_backend
      - qa_mgmt
    volumes:
      - rabbitmq-qa-data:/var/lib/rabbitmq

  kafka-qa-exporter:
    image: danielqsj/kafka-exporter:1.2.0
    container_name: kafka-qa-exporter
    environment:
      - KAFKA_SERVER=kafka-qa:9092
    networks:
      - qa_backend
    ports:
      - 9309:9308

  rabbitmq-qa-exporter:
    image: kbudde/rabbitmq-exporter:v0.30.0
    container_name: rabbitmq-qa-exporter
    environment:
      - RABBITMQ_URI=http://qa:${RABBITMQ_QA_PASSWORD:-qachangeme}@rabbitmq-qa:15672
    networks:
      - qa_backend
    ports:
      - 9420:9419

networks:
  dev_backend:
    driver: bridge
    internal: true
  dev_mgmt:
    driver: bridge
  qa_backend:
    driver: bridge
    internal: true
  qa_mgmt:
    driver: bridge

volumes:
  kafka-dev-data:
    name: kafka-dev-data
  rabbitmq-dev-data:
    name: rabbitmq-dev-data
  kafka-qa-data:
    name: kafka-qa-data
  rabbitmq-qa-data:
    name: rabbitmq-qa-data
